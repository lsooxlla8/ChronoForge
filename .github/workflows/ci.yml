name: macOS CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Build C++ core
        run: |
          cmake -S . -B build -DCHRONOFORGE_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Test C++ core
        run: ctest --test-dir build --output-on-failure

      - name: Build Swift app with strict warnings
        run: swift build -Xswiftc -warnings-as-errors

      - name: Run native codec integration
        run: swift run ChronoForgeIntegration

      - name: Run packaged pipeline self-test
        run: '"$(swift build --show-bin-path)/ChronoForgeMac" --self-test'
